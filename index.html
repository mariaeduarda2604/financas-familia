<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  html, body { margin:0; padding:0; background:#f4f6f8; }
  #app-root {
    --paper: #f4f6f8;
    --paper-line: #e3e7eb;
    --ink: #1e2b3a;
    --ink-soft: #667085;
    --ledger-green: #0f9d8e;
    --ledger-green-dark: #0b7568;
    --heading: #16324a;
    --stamp-red: #dc2626;
    --stamp-green: #16a34a;
    --gold: #d97706;
    --card-bg: #ffffff;
    --input-bg: #ffffff;
    --tab-inactive-bg: #e6eaee;
    --highlight-bg: #fff4e5;
    --badge-bg: #eef1f4;
    --badge-color: #445064;
    --badge-fatura-bg: #fdecd8;
    --badge-fatura-color: #92400e;
    --shadow: rgba(16, 24, 40, 0.08);
    font-family: 'Inter', -apple-system, sans-serif;
    color: var(--ink);
    background: var(--paper);
    min-height: 100vh;
    padding: 0;
  }
  #app-root * { box-sizing: border-box; }
  #app-root .mono { font-family: 'IBM Plex Mono', 'Courier New', monospace; }

  #app-root .cover {
    background: linear-gradient(135deg, #0f9d8e 0%, #0b6e63 100%);
    color: #ffffff;
    padding: 20px 24px 0 24px;
    border-bottom: 4px solid var(--gold);
  }
  #app-root .cover-top { display:flex; justify-content:space-between; align-items:flex-start; gap:12px; flex-wrap:wrap; }
  #app-root .cover h1 { font-family: 'Inter', sans-serif; font-weight: 700; font-size: 23px; margin: 0 0 3px 0; color: #ffffff; }
  #app-root .cover p { margin: 0 0 16px 0; color: rgba(255,255,255,0.85); font-size: 13px; }
  #app-root .sync-note { font-size: 11px; color: rgba(255,255,255,0.75); margin: -10px 0 12px 0; }
  #app-root .user-bar { font-size: 12px; color: rgba(255,255,255,0.85); text-align:right; }
  #app-root .user-bar .email { color: #ffffff; font-weight:600; display:block; margin-bottom:4px; }
  #app-root .tabs { display: flex; gap: 4px; flex-wrap: wrap; }
  #app-root .tab-btn {
    font-family: 'Inter', sans-serif; background: rgba(255,255,255,0.18); color: #ffffff;
    border: none; padding: 10px 18px; border-radius: 8px 8px 0 0; cursor: pointer;
    font-size: 13.5px; font-weight: 600; opacity: 0.82; transform: translateY(2px); transition: all .15s;
  }
  #app-root .tab-btn.active { background: var(--paper); color: var(--heading); opacity: 1; transform: translateY(0); box-shadow: 0 -2px 6px var(--shadow); }
  #app-root .tab-btn:hover { opacity: 1; }

  #app-root .panel { padding: 24px 24px 48px 24px; max-width: 920px; margin: 0 auto; }
  #app-root h2 {
    font-family: 'Inter', sans-serif; font-weight: 700; font-size: 17px; color: var(--heading);
    margin: 0 0 4px 0; border-bottom: 2px solid var(--paper-line); padding-bottom: 8px;
  }
  #app-root h3 { font-family: 'Inter', sans-serif; font-weight: 700; font-size: 14px; color: var(--heading); margin: 0 0 8px 0; }
  #app-root .subtext { color: var(--ink-soft); font-size: 13px; margin: 6px 0 16px 0; }

  #app-root .card { background: var(--card-bg); border: 1px solid var(--paper-line); border-radius: 10px; padding: 15px 17px; margin-bottom: 13px; box-shadow: 0 1px 3px var(--shadow); position: relative; }
  #app-root .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  #app-root .grid3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
  #app-root .grid4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
  @media (max-width: 640px) { #app-root .grid2, #app-root .grid3, #app-root .grid4 { grid-template-columns: 1fr; } }

  #app-root label { display: block; font-size: 11.5px; color: var(--ink-soft); margin-bottom: 4px; font-weight: 600; text-transform: uppercase; letter-spacing: .4px; }
  #app-root input, #app-root select {
    width: 100%; font-family: inherit; font-size: 14px; padding: 9px 10px; border: 1px solid #d6dbe1;
    border-radius: 6px; background: var(--input-bg); color: var(--ink); margin-bottom: 12px;

  #app-root input:focus, #app-root select:focus { outline: 2px solid var(--ledger-green); outline-offset: 1px; }
  #app-root .btn { font-family: 'Inter', sans-serif; background: var(--ledger-green); color: #ffffff; border: none; padding: 10px 18px; border-radius: 6px; cursor: pointer; font-size: 13.5px; font-weight: 700; }
  #app-root .btn:hover { background: var(--ledger-green-dark); }
  #app-root .btn.secondary { background: transparent; color: var(--ledger-green-dark); border: 1.5px solid var(--ledger-green); }
  #app-root .btn.danger { background: transparent; color: var(--stamp-red); border: 1.5px solid var(--stamp-red); padding: 5px 10px; font-size: 12px; }
  #app-root .btn.small { padding: 6px 12px; font-size: 12px; }
  #app-root .btn:disabled { opacity: .5; cursor: not-allowed; }

  #app-root .lancamento-row { display: flex; justify-content: space-between; align-items: center; padding: 9px 0; border-bottom: 1px solid var(--paper-line); font-size: 13.5px; gap: 10px; }
  #app-root .lancamento-row:last-child { border-bottom: none; }
  #app-root .lanc-meta { color: var(--ink-soft); font-size: 12px; }
  #app-root .badge { display:inline-block; font-size:10.5px; padding:2px 7px; border-radius:10px; background:var(--badge-bg); color:var(--badge-color); font-weight:600; margin-left:6px; }
  #app-root .badge.fatura { background:var(--badge-fatura-bg); color:var(--badge-fatura-color); }

  #app-root .stat-card { background: var(--card-bg); border: 1px solid var(--paper-line); border-radius: 10px; padding: 13px 15px; text-align: center; }
  #app-root .stat-card .num { font-family: 'IBM Plex Mono', monospace; font-size: 20px; font-weight: 700; color: var(--ink); }
  #app-root .stat-card .lbl { font-size: 11px; color: var(--ink-soft); text-transform: uppercase; letter-spacing: .4px; margin-top: 2px; }
  #app-root .stat-card.pos .num { color: var(--stamp-green); }
  #app-root .stat-card.neg .num { color: var(--stamp-red); }
  #app-root .stat-card.warn { background: var(--highlight-bg); }
  #app-root .stat-card.warn .num { color: var(--gold); }

  #app-root .stamp {
    position: absolute; top: 12px; right: 14px; color: #ffffff;
    font-family: 'Inter', sans-serif; font-weight: 700; font-size: 11px; padding: 3px 11px; border-radius: 20px;
    letter-spacing: .5px; background: var(--stamp-red);
  }
  #app-root .stamp.green { background: var(--stamp-green); }
  #app-root .stamp.orange { background: var(--gold); }

  #app-root .month-nav { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; }
  #app-root .month-label { font-family: 'Inter', sans-serif; font-weight: 700; font-size: 15px; color: var(--heading); min-width: 160px; text-align: center; }
  #app-root .info-box { background: var(--highlight-bg); border-left: 4px solid var(--gold); padding: 12px 14px; border-radius: 6px; font-size: 12.5px; color: #7a5211; margin-bottom: 16px; }
  #app-root .empty { color: var(--ink-soft); font-size: 13px; font-style: italic; padding: 8px 0; }
  #app-root .link-btn { background:none; border:none; color: var(--ledger-green-dark); text-decoration: underline; cursor:pointer; font-size:12px; padding:0; font-family:inherit; display:block; }
  #app-root .legend-item { display: flex; align-items: center; gap: 8px; font-size: 12.5px; margin-bottom: 6px; color: var(--ink); }
  #app-root .legend-dot { width: 11px; height: 11px; border-radius: 3px; flex-shrink: 0; }
  #app-root .mini-table { width: 100%; border-collapse: collapse; font-size: 12.5px; }
  #app-root .mini-table th { text-align: left; color: var(--ink-soft); font-size: 11px; text-transform: uppercase; padding-bottom: 6px; border-bottom: 1px solid var(--paper-line); }
  #app-root .mini-table td { padding: 6px 4px; border-bottom: 1px solid var(--paper-line); color: var(--ink); }

  /* ---- tela de login ---- */
  #app-root .login-wrap { min-height: 100vh; display:flex; align-items:center; justify-content:center; padding:20px; background: var(--paper); }
  #app-root .login-card { background: var(--card-bg); border:1px solid var(--paper-line); border-radius:14px; padding:32px 28px; max-width:380px; width:100%; box-shadow:0 8px 24px var(--shadow); }
  #app-root .login-card h1 { font-family:'Inter', sans-serif; font-weight:700; font-size:20px; color:var(--heading); margin:0 0 4px 0; text-align:center; }
  #app-root .login-card p.sub { color:var(--ink-soft); font-size:12.5px; text-align:center; margin:0 0 22px 0; }
  #app-root .login-msg { font-size:12.5px; margin: -6px 0 12px 0; min-height:16px; }
  #app-root .login-msg.err { color: var(--stamp-red); }
  #app-root .login-msg.ok { color: var(--stamp-green); }
  #app-root .login-actions { display:flex; gap:8px; margin-top:6px; }
  #app-root .login-actions .btn { flex:1; }
  #app-root .setup-warning { max-width:520px; margin:60px auto; background:var(--highlight-bg); border-left:4px solid var(--gold); padding:20px 22px; border-radius:8px; font-size:13.5px; line-height:1.6; color: var(--ink); }
  #app-root .setup-warning code { background:#f1f1f1; padding:1px 6px; border-radius:4px; }
</style>
</head>

<div id="app-root"></div>

<script>
(function(){
  // ============================================================
  // CONFIGURAÇÃO — cole aqui a URL e a chave "anon" do seu projeto Supabase
  // (Painel do Supabase → Project Settings → API)
  // ============================================================
  const SUPABASE_URL = 'https://uolgdimkxmehleiyvqwm.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVvbGdkaW1reG1laGxlaXl2cXdtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM0NDU3NDMsImV4cCI6MjA5OTAyMTc0M30.PXe0ImoWwWRZ39Zpr901IgPSzqxXQmtXIpaYRtSZvEs';
  // ============================================================

  const PALETTE = ['#0f9d8e','#2563eb','#d97706','#16a34a','#7c3aed','#0891b2','#e11d48',
                    '#4f46e5','#ea580c','#059669','#3b82f6','#a855f7','#0d9488','#db2777','#ca8a04'];

  const DEFAULT_CATEGORIAS = [
    {id:'cartao_duda', nome:'Cartão Duda', tipo:'Cartão de Crédito', diaVencimento:null, valorEsperado:0, isFatura:true},
    {id:'cartao_7700', nome:'Cartão 7700', tipo:'Cartão de Crédito', diaVencimento:null, valorEsperado:0, isFatura:true},
    {id:'emp_mp', nome:'Empréstimo Mercado Pago', tipo:'Empréstimo', diaVencimento:null, valorEsperado:0, isFatura:false},
    {id:'emp_itau', nome:'Empréstimo Itaú', tipo:'Empréstimo', diaVencimento:null, valorEsperado:0, isFatura:false},
    {id:'emprestimo_duda', nome:'Empréstimo Duda', tipo:'Empréstimo', diaVencimento:null, valorEsperado:0, isFatura:false},
    {id:'suelem', nome:'Suelem', tipo:'Pessoal', diaVencimento:null, valorEsperado:0, isFatura:false},
    {id:'nivaldo', nome:'Nivaldo', tipo:'Pessoal', diaVencimento:null, valorEsperado:0, isFatura:false},
    {id:'gastos_duda', nome:'Gastos Duda', tipo:'Variável', diaVencimento:null, valorEsperado:0, isFatura:false},
    {id:'parcela_casa', nome:'Parcela da Casa', tipo:'Financiamento', diaVencimento:null, valorEsperado:0, isFatura:false},
    {id:'iptu', nome:'IPTU', tipo:'Imposto', diaVencimento:null, valorEsperado:0, isFatura:false},
    {id:'seguro_carro', nome:'Seguro do Carro', tipo:'Seguro', diaVencimento:null, valorEsperado:0, isFatura:false},
    {id:'codau', nome:'Codau (Água)', tipo:'Recorrente', diaVencimento:null, valorEsperado:0, isFatura:false},
    {id:'cemig', nome:'Cemig (Energia)', tipo:'Recorrente', diaVencimento:null, valorEsperado:0, isFatura:false},
    {id:'internet', nome:'Internet', tipo:'Recorrente', diaVencimento:null, valorEsperado:0, isFatura:false},
    {id:'gastos_eventuais', nome:'Gastos Eventuais', tipo:'Variável', diaVencimento:null, valorEsperado:0, isFatura:false},
  ];

  function defaultState(){
    return { categorias: DEFAULT_CATEGORIAS.map(c => ({...c})), lancamentos: [], rendaPorMes: {}, contasPagas: {}, faturas: {}, pagamentosRegistro: [] };
  }

  let state = defaultState();
  let activeTab = 'lancar';
  let resumoCursor = new Date(); resumoCursor.setDate(1);
  let currentUser = null;
  let sb = null;
  let realtimeChannel = null;

  // ---------- helpers de data/dinheiro ----------
  function pad2(n){ return n < 10 ? '0'+n : ''+n; }
  function todayYMD(){ const d = new Date(); return `${d.getFullYear()}-${pad2(d.getMonth()+1)}-${pad2(d.getDate())}`; }
  function parseYMD(s){ if(!s) return null; const [y,m,d] = s.split('-').map(Number); return new Date(y, m-1, d); }
  function monthKey(date){ return `${date.getFullYear()}-${pad2(date.getMonth()+1)}`; }
  function monthIndex(mk){ const [y,m] = mk.split('-').map(Number); return y*12+m; }
  function addMonthsToMK(mk, n){ const idx = monthIndex(mk)+n; const y = Math.floor((idx-1)/12); const m = idx-y*12; return `${y}-${pad2(m)}`; }
  function fmtMoney(v){ v = Number(v)||0; return v.toLocaleString('pt-BR', {style:'currency', currency:'BRL'}); }
  function fmtDateBR(ymd){ if(!ymd) return '—'; const d = parseYMD(ymd); return `${pad2(d.getDate())}/${pad2(d.getMonth()+1)}/${d.getFullYear()}`; }
  function fmtMK(mk){ const [y,m] = mk.split('-').map(Number); return `${MESES[m-1].slice(0,3)}/${y}`; }
  const MESES = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
  function escapeHtml(s){ const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
  function getCat(id){ return state.categorias.find(c => c.id === id); }
  function catName(id){ const c = getCat(id); return c ? c.nome : '(categoria removida)'; }

  // ---------- lógica de parcelas ----------
  function occurrencesOf(l){
    const start = parseYMD(l.data);
    const total = l.parcelasTotal || 1;
    const atual = l.parcelaAtual || 1;
    const n = Math.max(1, total - atual + 1);
    const arr = [];
    for (let i=0;i<n;i++){
      const d = new Date(start.getFullYear(), start.getMonth()+i, start.getDate());
      arr.push({ mk: monthKey(d), parcelaNum: atual+i, date: d });
    }
    return arr;
  }
  function getGastoCategoriaMes(catId, mk){
    const cat = getCat(catId);
    if (!cat) return 0;
    if (cat.isFatura) {
      const f = state.faturas[catId];
      return (f && f[mk] !== undefined) ? Number(f[mk])||0 : 0;
    }
    let total = 0;
    state.lancamentos.filter(l => l.categoriaId === catId).forEach(l => {
      occurrencesOf(l).forEach(o => { if (o.mk === mk) total += Number(l.valor||0); });
    });
    return total;
  }
  function planStatusAt(l, mk){
    const total = l.parcelasTotal || 1;
    const atual0 = l.parcelaAtual || 1;
    const startMK = monthKey(parseYMD(l.data));
    const passed = monthIndex(mk) - monthIndex(startMK);
    const parcelaAgora = atual0 + passed;
    const restante = total - parcelaAgora;
    return { parcelaAgora, total, restante, finished: parcelaAgora > total || passed < 0 };
  }

  function calcularLimiteCartao(c, mk){
    // Comprometido em parcelas futuras: soma das parcelas AINDA NÃO cobradas (após a deste mês)
    // de compras parceladas ativas nesse cartão — isso é limite que já está "reservado".
    let comprometidoFuturo = 0;
    state.lancamentos.filter(l => l.categoriaId === c.id && (l.parcelasTotal||1) > 1).forEach(l => {
      const st = planStatusAt(l, mk);
      if (!st.finished) comprometidoFuturo += Math.max(st.restante, 0) * l.valor;
    });
    // Fatura deste mês: valor lançado manualmente (Fechar Fatura), ou estimativa a partir
    // das parcelas e compras à vista lançadas neste mês, se a fatura ainda não fechou.
    const faturaLancada = state.faturas[c.id] && state.faturas[c.id][mk] !== undefined;
    let faturaAtual = 0;
    if (faturaLancada) {
      faturaAtual = state.faturas[c.id][mk];
    } else {
      state.lancamentos.filter(l => l.categoriaId === c.id).forEach(l => {
        occurrencesOf(l).forEach(o => { if (o.mk === mk) faturaAtual += Number(l.valor||0); });
      });
    }
    const faturaPaga = (state.contasPagas[mk]||[]).includes(c.id);
    const consumido = (faturaPaga ? 0 : faturaAtual) + comprometidoFuturo;
    const limiteTotal = c.limiteTotal || 0;
    const disponivel = limiteTotal - consumido;
    return { faturaAtual, faturaLancada, faturaPaga, comprometidoFuturo, consumido, limiteTotal, disponivel };
  }

  // ============================================================
  // CAMADA DE DADOS (Supabase)
  // ============================================================
  async function fetchAll(){
    const [catR, lancR, rendaR, pagasR, faturasR] = await Promise.all([
      sb.from('categorias').select('*'),
      sb.from('lancamentos').select('*'),
      sb.from('renda_mensal').select('*'),
      sb.from('contas_pagas').select('*'),
      sb.from('faturas').select('*'),
    ]);
    if (catR.data && catR.data.length){
      state.categorias = catR.data.map(r => ({
        id: r.id, nome: r.nome, tipo: r.tipo, grupo: r.grupo || '',
        diaVencimento: r.dia_vencimento, valorEsperado: Number(r.valor_esperado)||0, isFatura: !!r.is_fatura,
        limiteTotal: Number(r.limite_total)||0
      }));
    }
    state.lancamentos = (lancR.data||[]).map(r => ({
      id: r.id, categoriaId: r.categoria_id, valor: Number(r.valor)||0, data: r.data, descricao: r.descricao || '',
      parcelaAtual: r.parcela_atual||1, parcelasTotal: r.parcelas_total||1, criadoEm: r.criado_em, criadoPor: r.criado_por
    }));
    state.rendaPorMes = {};
    (rendaR.data||[]).forEach(r => { state.rendaPorMes[r.mes] = Number(r.valor)||0; });
    state.contasPagas = {};
    state.pagamentosRegistro = [];
    (pagasR.data||[]).forEach(r => {
      state.contasPagas[r.mes] = state.contasPagas[r.mes]||[];
      state.contasPagas[r.mes].push(r.categoria_id);
      state.pagamentosRegistro.push({ mes: r.mes, categoriaId: r.categoria_id, pagoEm: r.pago_em, valorPago: (r.valor_pago!==null && r.valor_pago!==undefined) ? Number(r.valor_pago) : null });
    });
    state.faturas = {};
    (faturasR.data||[]).forEach(r => { state.faturas[r.categoria_id] = state.faturas[r.categoria_id]||{}; state.faturas[r.categoria_id][r.mes] = Number(r.valor)||0; });
  }

  async function criarLancamento(obj){
    return sb.from('lancamentos').insert({
      categoria_id: obj.categoriaId, valor: obj.valor, data: obj.data, descricao: obj.descricao,
      parcela_atual: obj.parcelaAtual, parcelas_total: obj.parcelasTotal,
      criado_por: currentUser ? currentUser.email : null
    });
  }
  async function excluirLancamento(id){ return sb.from('lancamentos').delete().eq('id', id); }
  async function atualizarValorLancamento(id, novoValor){ return sb.from('lancamentos').update({ valor: novoValor }).eq('id', id); }
  async function salvarFatura(categoriaId, mes, valor){
    return sb.from('faturas').upsert({ categoria_id: categoriaId, mes, valor });
  }
  async function salvarRenda(mes, valor){ return sb.from('renda_mensal').upsert({ mes, valor }); }
  async function toggleContaPaga(mes, categoriaId, marcarPaga){
    if (marcarPaga) return sb.from('contas_pagas').upsert({ mes, categoria_id: categoriaId, pago_em: new Date().toISOString() });
    return sb.from('contas_pagas').delete().eq('mes', mes).eq('categoria_id', categoriaId);
  }
  async function marcarPagoDetalhado(mes, categoriaId, valorPago, dataPagamentoYMD){
    const dataISO = new Date(dataPagamentoYMD + 'T12:00:00').toISOString();
    return sb.from('contas_pagas').upsert({ mes, categoria_id: categoriaId, pago_em: dataISO, valor_pago: valorPago });
  }
  async function salvarConfigCategoria(id, diaVencimento, valorEsperado, grupo){
    return sb.from('categorias').update({ dia_vencimento: diaVencimento, valor_esperado: valorEsperado, grupo: grupo || null }).eq('id', id);
  }
  async function salvarLimiteCartao(id, limiteTotal){
    return sb.from('categorias').update({ limite_total: limiteTotal }).eq('id', id);
  }
  function slugify(nome){
    return nome.toString().normalize('NFD').replace(/[\u0300-\u036f]/g,'')
      .toLowerCase().trim().replace(/[^a-z0-9]+/g,'_').replace(/^_+|_+$/g,'') || ('cat_'+Date.now());
  }
  async function criarCategoria(nome, tipo, isFatura, grupo){
    let id = slugify(nome);
    const existente = state.categorias.find(c => c.id === id);
    if (existente) id = id + '_' + Math.random().toString(36).slice(2,5);
    return sb.from('categorias').insert({ id, nome, tipo: tipo || 'Outros', dia_vencimento: null, valor_esperado: 0, is_fatura: !!isFatura, grupo: grupo || null });
  }
  function gruposExistentes(){
    const set = new Set();
    state.categorias.forEach(c => { if (c.grupo && c.grupo.trim()) set.add(c.grupo.trim()); });
    return Array.from(set).sort();
  }
  function grupoDe(c){ return (c.grupo && c.grupo.trim()) ? c.grupo.trim() : c.nome; }

  async function refrescarEexibir(){ await fetchAll(); render(); }

  function mostrarErro(err){
    alert('Não consegui salvar: ' + (err && err.message ? err.message : 'erro desconhecido. Verifique sua conexão e tente novamente.'));
  }

  function isTypingInApp(){
    const el = document.activeElement;
    if (!el) return false;
    const root = document.getElementById('app-root');
    return root.contains(el) && (el.tagName === 'INPUT' || el.tagName === 'SELECT');
  }
  async function onRemoteChange(){
    if (isTypingInApp()) return;
    await refrescarEexibir();
  }
  function subscribeRealtime(){
    if (realtimeChannel) return;
    realtimeChannel = sb.channel('financas-changes')
      .on('postgres_changes', { event:'*', schema:'public', table:'lancamentos' }, onRemoteChange)
      .on('postgres_changes', { event:'*', schema:'public', table:'renda_mensal' }, onRemoteChange)
      .on('postgres_changes', { event:'*', schema:'public', table:'contas_pagas' }, onRemoteChange)
      .on('postgres_changes', { event:'*', schema:'public', table:'faturas' }, onRemoteChange)
      .on('postgres_changes', { event:'*', schema:'public', table:'categorias' }, onRemoteChange)
      .subscribe();
  }
  function unsubscribeRealtime(){ if (realtimeChannel){ sb.removeChannel(realtimeChannel); realtimeChannel = null; } }

  // ============================================================
  // TELA DE LOGIN
  // ============================================================
  function renderLogin(msg, isErr){
    const root = document.getElementById('app-root');
    root.innerHTML = `
      <div class="login-wrap">
        <div class="login-card">
          <h1>📒 Livro-Caixa da Família</h1>
          <p class="sub">Entre com seu e-mail para acessar os gastos da família.</p>
          <div class="login-msg ${isErr ? 'err' : 'ok'}">${msg || ''}</div>
          <label>E-mail</label>
          <input type="email" id="login-email" placeholder="voce@exemplo.com">
          <label>Senha</label>
          <input type="password" id="login-senha" placeholder="mínimo 6 caracteres">
          <div class="login-actions">
            <button class="btn secondary" id="btn-signup">Criar conta</button>
            <button class="btn" id="btn-login">Entrar</button>
          </div>
        </div>
      </div>
    `;
    root.querySelector('#btn-login').addEventListener('click', async () => {
      const email = root.querySelector('#login-email').value.trim();
      const senha = root.querySelector('#login-senha').value;
      if (!email || !senha) { renderLogin('Preencha e-mail e senha.', true); return; }
      const { error } = await sb.auth.signInWithPassword({ email, password: senha });
      if (error) renderLogin(traduzErro(error.message), true);
    });
    root.querySelector('#btn-signup').addEventListener('click', async () => {
      const email = root.querySelector('#login-email').value.trim();
      const senha = root.querySelector('#login-senha').value;
      if (!email || !senha) { renderLogin('Preencha e-mail e senha.', true); return; }
      if (senha.length < 6) { renderLogin('A senha precisa ter pelo menos 6 caracteres.', true); return; }
      const { data, error } = await sb.auth.signUp({ email, password: senha });
      if (error) { renderLogin(traduzErro(error.message), true); return; }
      if (data.session) { /* login automático já acontece via onAuthStateChange */ }
      else renderLogin('Conta criada! Verifique seu e-mail para confirmar antes de entrar.', false);
    });
  }
  function traduzErro(msg){
    if (/already registered/i.test(msg)) return 'Este e-mail já tem cadastro. Tente entrar em vez de criar conta.';
    if (/invalid login credentials/i.test(msg)) return 'E-mail ou senha incorretos.';
    if (/email not confirmed/i.test(msg)) return 'Confirme seu e-mail antes de entrar (veja a caixa de entrada).';
    return msg;
  }

  // ---------- TAB: RESUMO DO MÊS ----------
  function buildDonutSVG(ranking, total){
    if (!ranking.length || total <= 0) return '<div class="empty">Nenhum gasto lançado neste mês ainda.</div>';
    const cx = 90, cy = 90, r = 70, rInner = 40;
    let angle = -Math.PI/2;
    let paths = '';
    ranking.forEach(([id, val], i) => {
      const frac = val/total;
      const next = angle + frac*Math.PI*2;
      const x1 = cx + r*Math.cos(angle), y1 = cy + r*Math.sin(angle);
      const x2 = cx + r*Math.cos(next), y2 = cy + r*Math.sin(next);
      const xi1 = cx + rInner*Math.cos(next), yi1 = cy + rInner*Math.sin(next);
      const xi2 = cx + rInner*Math.cos(angle), yi2 = cy + rInner*Math.sin(angle);
      const large = (next-angle) > Math.PI ? 1 : 0;
      const color = PALETTE[i % PALETTE.length];
      paths += `<path d="M${x1},${y1} A${r},${r} 0 ${large} 1 ${x2},${y2} L${xi1},${yi1} A${rInner},${rInner} 0 ${large} 0 ${xi2},${yi2} Z" fill="${color}" stroke="var(--card-bg)" stroke-width="1.5"/>`;
      angle = next;
    });
    return `<svg width="180" height="180" viewBox="0 0 180 180">${paths}
      <text x="90" y="86" text-anchor="middle" font-family="IBM Plex Mono, monospace" font-size="12" fill="var(--ink)" font-weight="600">Total</text>
      <text x="90" y="102" text-anchor="middle" font-family="IBM Plex Mono, monospace" font-size="11" fill="var(--ink-soft)">${fmtMoney(total).replace('R$','R$ ')}</text>
    </svg>`;
  }

  function renderResumo(panel){
    const mk = monthKey(resumoCursor);
    const label = `${MESES[resumoCursor.getMonth()]} de ${resumoCursor.getFullYear()}`;
    const renda = state.rendaPorMes[mk] || 0;

    const porGrupo = {};
    state.categorias.forEach(c => {
      const v = getGastoCategoriaMes(c.id, mk);
      if (v > 0) {
        const label = grupoDe(c);
        porGrupo[label] = (porGrupo[label]||0) + v;
      }
    });
    const ranking = Object.entries(porGrupo).sort((a,b) => b[1]-a[1]);
    const totalGasto = ranking.reduce((s,[,v]) => s+v, 0);
    const saldo = renda - totalGasto;

    // Já pago x Ainda pendente, para o mês em exibição
    const comDataResumo = state.categorias.filter(c => c.diaVencimento);
    let totalPagoResumo = 0, totalPendenteResumo = 0;
    comDataResumo.forEach(c => {
      const v = valorCategoriaMes(c, mk);
      const pago = (state.contasPagas[mk]||[]).includes(c.id);
      if (pago) totalPagoResumo += v; else totalPendenteResumo += v;
    });
    const totalContasResumo = totalPagoResumo + totalPendenteResumo;
    const pctPagoResumo = totalContasResumo > 0 ? (totalPagoResumo/totalContasResumo*100) : 0;

    let proxMeses = [];
    for (let i=0;i<6;i++){
      const mkFut = addMonthsToMK(monthKey(new Date()), i);
      let totalFut = 0, estimativaFatura = 0;
      state.categorias.forEach(c => {
        if (c.isFatura) {
          const f = state.faturas[c.id];
          if (f && f[mkFut] !== undefined) totalFut += Number(f[mkFut])||0;
          else {
            state.lancamentos.filter(l => l.categoriaId===c.id).forEach(l => {
              occurrencesOf(l).forEach(o => { if (o.mk===mkFut) estimativaFatura += Number(l.valor||0); });
            });
          }
        } else {
          totalFut += getGastoCategoriaMes(c.id, mkFut);
        }
      });
      proxMeses.push({ mk: mkFut, total: totalFut, estimativaFatura });
    }

    panel.innerHTML = `
      <h2>Resumo do Mês</h2>
      <div class="month-nav">
        <button class="btn secondary small" id="btn-prev-mes">‹ mês anterior</button>
        <div class="month-label">${label}</div>
        <button class="btn secondary small" id="btn-next-mes">próximo mês ›</button>
      </div>

      <div class="card">
        <label>Dinheiro disponível este mês (renda / entradas)</label>
        <input type="number" id="f-renda" step="0.01" min="0" value="${renda || ''}" placeholder="0,00">
        <button class="btn small" id="btn-salvar-renda">Salvar renda do mês</button>
      </div>

      <div class="grid3" style="margin: 18px 0;">
        <div class="stat-card"><div class="num mono">${fmtMoney(renda)}</div><div class="lbl">Renda do mês</div></div>
        <div class="stat-card neg"><div class="num mono">${fmtMoney(totalGasto)}</div><div class="lbl">Gastos lançados</div></div>
        <div class="stat-card ${saldo >= 0 ? 'pos' : 'neg'}"><div class="num mono">${fmtMoney(saldo)}</div><div class="lbl">Saldo disponível</div></div>
      </div>

      <h2>Contas Pagas x Pendentes</h2>
      <div class="card">
        <div class="grid2" style="margin-bottom:10px;">
          <div class="stat-card pos"><div class="num mono">${fmtMoney(totalPagoResumo)}</div><div class="lbl">Já pago</div></div>
          <div class="stat-card neg"><div class="num mono">${fmtMoney(totalPendenteResumo)}</div><div class="lbl">Ainda pendente</div></div>
        </div>
        <div class="bar-track"><div class="bar-fill" style="width:${pctPagoResumo}%; background:var(--stamp-green);"></div></div>
        <div class="lanc-meta" style="margin-top:6px;">${pctPagoResumo.toFixed(0)}% das contas com vencimento configurado já pagas em ${label}</div>
      </div>

      <h2>Onde o dinheiro está concentrado</h2>
      <div class="card">
        <div style="display:flex; gap:24px; flex-wrap:wrap; align-items:center;">
          <div>${buildDonutSVG(ranking, totalGasto)}</div>
          <div style="flex:1; min-width:200px;">
            ${ranking.length === 0 ? '' : ranking.map(([label,val],i) => `
              <div class="legend-item">
                <span class="legend-dot" style="background:${PALETTE[i % PALETTE.length]}"></span>
                <span style="flex:1;">${escapeHtml(label)}</span>
                <span class="mono">${fmtMoney(val)}</span>
                <span class="lanc-meta">(${totalGasto>0 ? (val/totalGasto*100).toFixed(0) : 0}%)</span>
              </div>
            `).join('')}
          </div>
        </div>
      </div>

      <h2 style="margin-top:24px;">Projeção dos Próximos Meses</h2>
      <p class="subtext">Considera parcelas já lançadas para categorias normais. Para os cartões, mostra a fatura real quando já lançada, ou uma estimativa das compras parceladas em andamento quando ainda não fechou.</p>
      <div class="card">
        <table class="mini-table">
          <tr><th>Mês</th><th>Gasto total (contas normais + faturas já lançadas)</th><th>Estimativa cartões (ainda não fechados)</th></tr>
          ${proxMeses.map(p => `
            <tr>
              <td>${fmtMK(p.mk)}</td>
              <td class="mono">${fmtMoney(p.total)}</td>
              <td class="mono lanc-meta">${p.estimativaFatura>0 ? fmtMoney(p.estimativaFatura) : '—'}</td>
            </tr>
          `).join('')}
        </table>
      </div>
    `;

    panel.querySelector('#btn-prev-mes').addEventListener('click', () => { resumoCursor.setMonth(resumoCursor.getMonth()-1); renderResumo(panel); });
    panel.querySelector('#btn-next-mes').addEventListener('click', () => { resumoCursor.setMonth(resumoCursor.getMonth()+1); renderResumo(panel); });
    panel.querySelector('#btn-salvar-renda').addEventListener('click', async () => {
      try {
        const v = parseFloat(panel.querySelector('#f-renda').value) || 0;
        const { error } = await salvarRenda(mk, v);
        if (error) throw error;
        await refrescarEexibir();
      } catch (err) { mostrarErro(err); }
    });
  }

  // ---------- TAB: CONTAS A VENCER ----------
  function activePlanFor(catId, mk){
    let best = null;
    state.lancamentos.filter(l => l.categoriaId===catId && (l.parcelasTotal||1) > 1).forEach(l => {
      const st = planStatusAt(l, mk);
      if (!st.finished && st.parcelaAgora >= 1) {
        if (!best || l.valor > best.valor) best = { l, ...st };
      }
    });
    return best;
  }
  function valorCategoriaMes(c, mk){
    if (c.isFatura) {
      const f = state.faturas[c.id];
      return (f && f[mk] !== undefined) ? f[mk] : (c.valorEsperado||0);
    }
    const plan = activePlanFor(c.id, mk);
    return plan ? plan.l.valor : (c.valorEsperado||0);
  }
  const MESES_LOOKBACK = 3;
  function mesesPendentes(c, hoje){
    if (!c.diaVencimento) return [];
    const mkAtual = monthKey(hoje);
    const pendentes = [];
    for (let i = MESES_LOOKBACK - 1; i >= 0; i--){
      const mk = addMonthsToMK(mkAtual, -i);
      const [y, m] = mk.split('-').map(Number);
      const vencimento = new Date(y, m-1, c.diaVencimento);
      const pago = (state.contasPagas[mk]||[]).includes(c.id);
      if (!pago && vencimento <= hoje) {
        pendentes.push({ mk, vencimento, valor: valorCategoriaMes(c, mk) });
      }
    }
    return pendentes; // do mês mais antigo para o mais recente
  }

  function calcularPagoPendente(hoje){
    const mk = monthKey(hoje);
    const comData = state.categorias.filter(c => c.diaVencimento);
    let totalPago = 0, totalAtrasadoGeral = 0, totalAVencerAtual = 0;
    comData.forEach(c => {
      const pendentes = mesesPendentes(c, hoje);
      const pago = (state.contasPagas[mk]||[]).includes(c.id);
      const emAtrasoEsteMes = pendentes.some(p => p.mk === mk);
      if (pago) totalPago += valorCategoriaMes(c, mk);
      pendentes.forEach(p => { totalAtrasadoGeral += p.valor; });
      if (!pago && !emAtrasoEsteMes) totalAVencerAtual += valorCategoriaMes(c, mk);
    });
    const totalPendenteGeral = totalAtrasadoGeral + totalAVencerAtual;
    const totalGeral = totalPago + totalPendenteGeral;
    const pct = totalGeral > 0 ? (totalPago/totalGeral*100) : 0;
    return { totalPago, totalAtrasadoGeral, totalAVencerAtual, totalPendenteGeral, pct };
  }

  function renderContas(panel){
    const hoje = new Date(); hoje.setHours(0,0,0,0);
    const mk = monthKey(hoje);
    const comData = state.categorias.filter(c => c.diaVencimento);
    const semData = state.categorias.filter(c => !c.diaVencimento);

    const pendentesMap = {};
    comData.forEach(c => { pendentesMap[c.id] = mesesPendentes(c, hoje); });

    const statusMap = {};
    comData.forEach(c => {
      const pendentes = pendentesMap[c.id];
      if (pendentes.length > 0) { statusMap[c.id] = 'vencida'; return; }
      const pagoAtual = (state.contasPagas[mk]||[]).includes(c.id);
      const vencimentoAtual = new Date(hoje.getFullYear(), hoje.getMonth(), c.diaVencimento);
      const diff = Math.round((vencimentoAtual - hoje)/86400000);
      if (!pagoAtual && diff >= 0 && diff <= 5) statusMap[c.id] = 'atencao';
      else statusMap[c.id] = 'em-dia';
    });
    const vencidas = comData.filter(c => statusMap[c.id]==='vencida');
    const atencao = comData.filter(c => statusMap[c.id]==='atencao');
    const emDia = comData.filter(c => statusMap[c.id]==='em-dia');

    function contaCard(c){
      const status = statusMap[c.id];
      const pendentes = pendentesMap[c.id];
      const pagoAtual = (state.contasPagas[mk]||[]).includes(c.id);
      const vencimentoAtual = new Date(hoje.getFullYear(), hoje.getMonth(), c.diaVencimento);
      const diffAtual = Math.round((vencimentoAtual - hoje)/86400000);
      let stamp = '';
      if (status === 'vencida') {
        stamp = `<div class="stamp">VENCIDO${pendentes.length>1 ? ' ('+pendentes.length+'x)' : ''}</div>`;
      }
      else if (status === 'atencao') stamp = '<div class="stamp orange">ATENÇÃO</div>';
      else if (pagoAtual) stamp = '<div class="stamp green">PAGO</div>';
      const plan = !c.isFatura ? activePlanFor(c.id, mk) : null;
      const parcelaInfo = plan ? `<div class="lanc-meta">Parcela ${plan.parcelaAgora} de ${plan.total} — faltam ${Math.max(plan.restante,0)} parcela(s)</div>` : '';
      const notaFatura = c.isFatura
        ? `<div class="lanc-meta">${(state.faturas[c.id] && state.faturas[c.id][mk] !== undefined) ? 'Fatura já fechada este mês.' : 'Fatura ainda não fechada — lance o valor em Lançar Gasto → "Fechar Fatura do Cartão".'}</div>`
        : '';

      let detalheVencimento;
      if (status === 'atencao') {
        detalheVencimento = `<strong style="color:var(--gold);">Vence em ${diffAtual} dia${diffAtual===1?'':'s'}</strong> (${fmtDateBR(`${vencimentoAtual.getFullYear()}-${pad2(vencimentoAtual.getMonth()+1)}-${pad2(c.diaVencimento)}`)})`;
      } else if (status === 'em-dia' && !pagoAtual) {
        detalheVencimento = `Vence em ${diffAtual} dia${diffAtual===1?'':'s'} (${fmtDateBR(`${vencimentoAtual.getFullYear()}-${pad2(vencimentoAtual.getMonth()+1)}-${pad2(c.diaVencimento)}`)})`;
      } else {
        detalheVencimento = `Vence todo dia ${c.diaVencimento}`;
      }

      let blocoAtraso = '';
      if (pendentes.length > 0) {
        const totalAtraso = pendentes.reduce((s,p)=>s+p.valor,0);
        blocoAtraso = `
          <div style="background:#fdeceb; border:1px solid #f3c9c4; border-radius:8px; padding:8px 10px; margin:8px 0;">
            <div style="color:var(--stamp-red); font-weight:700; font-size:13px; margin-bottom:8px;">
              Em atraso: ${fmtMoney(totalAtraso)} (${pendentes.length} ${pendentes.length===1?'mês':'meses'})
            </div>
            ${pendentes.map(p => {
              const diasAtraso = Math.round((hoje - p.vencimento)/86400000);
              const uid = `${c.id}__${p.mk}`;
              return `
              <div style="border-bottom:1px dashed #f3c9c4; padding:6px 0; margin-bottom:6px;">
                <div style="font-size:12.5px; margin-bottom:6px;">
                  <strong>${fmtMK(p.mk)}</strong> <span class="lanc-meta">— venceu dia ${fmtDateBR(`${p.vencimento.getFullYear()}-${pad2(p.vencimento.getMonth()+1)}-${pad2(p.vencimento.getDate())}`)} · ${diasAtraso} dia${diasAtraso===1?'':'s'} de atraso até hoje</span>
                </div>
                <div class="grid3" style="align-items:end; gap:8px;">
                  <div style="margin-bottom:0;"><label style="margin-bottom:2px;">Valor pago (R$)</label><input type="number" step="0.01" min="0" id="pgv-${uid}" value="${p.valor}" style="margin-bottom:0;"></div>
                  <div style="margin-bottom:0;"><label style="margin-bottom:2px;">Data em que pagou</label><input type="date" id="pgd-${uid}" value="${todayYMD()}" style="margin-bottom:0;"></div>
                  <button class="btn small danger" data-marcar-atrasado="${uid}" data-cat="${c.id}" data-mes="${p.mk}">Marcar como pago</button>
                </div>
              </div>
            `; }).join('')}
          </div>
        `;
      }

      const mostraToggleAtual = !pendentes.some(p => p.mk === mk);
      const botaoAtual = mostraToggleAtual ? `
          <button class="btn small ${pagoAtual ? 'secondary' : ''}" data-toggle-paga="${c.id}" data-mes="${mk}" style="margin-top:8px;">
            ${pagoAtual ? 'Desmarcar pagamento deste mês' : 'Marcar como paga este mês'}
          </button>` : '';

      return `
        <div class="card">
          ${stamp}
          <strong>${c.nome}</strong>${c.isFatura ? '<span class="badge fatura">fatura</span>' : ''}
          <div class="lanc-meta" style="margin:4px 0 6px 0;">
            ${detalheVencimento} ${valorCategoriaMes(c, mk) ? '· valor deste mês ' + fmtMoney(valorCategoriaMes(c, mk)) : ''}
          </div>
          ${parcelaInfo}
          ${notaFatura}
          ${blocoAtraso}
          ${botaoAtual}
        </div>
      `;
    }

    const planosAtivos = [];
    state.lancamentos.forEach(l => {
      if ((l.parcelasTotal||1) <= 1) return;
      const st = planStatusAt(l, mk);
      if (!st.finished) {
        const cat = getCat(l.categoriaId);
        const dInicio = parseYMD(l.data);
        const endDate = new Date(dInicio.getFullYear(), dInicio.getMonth() + (l.parcelasTotal - l.parcelaAtual), 1);
        planosAtivos.push({ l, cat, st, endMK: monthKey(endDate) });
      }
    });
    planosAtivos.sort((a,b) => (a.cat?a.cat.nome:'').localeCompare(b.cat?b.cat.nome:''));

    // ---- Pago vs Pendente este mês ----
    const { totalPago, totalAtrasadoGeral, totalAVencerAtual, totalPendenteGeral, pct: pctPago } = calcularPagoPendente(hoje);

    // ---- Contas atrasadas pagas este mês (pagamentos em atraso registrados neste mês calendário) ----
    const pagamentosAtrasadosEsteMes = (state.pagamentosRegistro||[]).filter(p => {
      if (!p.pagoEm) return false;
      const pagoEmDate = new Date(p.pagoEm);
      if (monthKey(pagoEmDate) !== mk) return false;
      const cat = getCat(p.categoriaId);
      if (!cat || !cat.diaVencimento) return false;
      const [y,m] = p.mes.split('-').map(Number);
      const vencimentoCompetencia = new Date(y, m-1, cat.diaVencimento);
      return pagoEmDate > vencimentoCompetencia;
    }).map(p => {
      const cat = getCat(p.categoriaId);
      const [y,m] = p.mes.split('-').map(Number);
      const vencimentoCompetencia = new Date(y, m-1, cat.diaVencimento);
      const pagoEmDate = new Date(p.pagoEm);
      const diasAtraso = Math.round((pagoEmDate - vencimentoCompetencia)/86400000);
      return { cat, mesCompetencia: p.mes, valor: (p.valorPago !== null && p.valorPago !== undefined) ? p.valorPago : valorCategoriaMes(cat, p.mes), pagoEmDate, diasAtraso };
    }).sort((a,b) => b.pagoEmDate - a.pagoEmDate);

    panel.innerHTML = `
      <h2>Contas a Vencer</h2>
      <p class="subtext">O dia de vencimento é fixo todo mês. Se um mês passado não foi marcado como pago, ele continua aparecendo aqui como atrasado, somado ao que já está vencendo agora, até você marcar cada mês como pago.</p>

      <div class="grid3" style="margin-bottom:20px;">
        <div class="stat-card neg"><div class="num mono">${vencidas.length}</div><div class="lbl">Vencidas</div></div>
        <div class="stat-card warn"><div class="num mono">${atencao.length}</div><div class="lbl">Vencem em breve</div></div>
        <div class="stat-card pos"><div class="num mono">${emDia.length}</div><div class="lbl">Em dia</div></div>
      </div>

      <h2>Contas Pagas x Pendentes ${fmtMK(mk)}</h2>
      <div class="card">
        <div class="grid2" style="margin-bottom:10px;">
          <div class="stat-card pos"><div class="num mono">${fmtMoney(totalPago)}</div><div class="lbl">Já pago</div></div>
          <div class="stat-card neg"><div class="num mono">${fmtMoney(totalPendenteGeral)}</div><div class="lbl">Ainda pendente</div></div>
        </div>
        <div class="bar-track"><div class="bar-fill" style="width:${pctPago}%; background:var(--stamp-green);"></div></div>
        <div class="lanc-meta" style="margin-top:6px;">
          ${pctPago.toFixed(0)}% do total de contas com vencimento configurado já está pago
          ${totalAtrasadoGeral > 0 ? ' · ' + fmtMoney(totalAtrasadoGeral) + ' em atraso' : ''}
        </div>
      </div>

      ${vencidas.length ? `<h2>Precisam de atenção agora</h2>${vencidas.map(contaCard).join('')}` : ''}
      ${atencao.length ? `<h2>Vencem nos próximos 5 dias</h2>${atencao.map(contaCard).join('')}` : ''}
      ${emDia.length ? `<h2>Em dia</h2>${emDia.map(contaCard).join('')}` : ''}

      <h2 style="margin-top:26px;">Contas Atrasadas Pagas Este Mês</h2>
      ${pagamentosAtrasadosEsteMes.length === 0 ? '<div class="card"><div class="empty">Nenhum pagamento em atraso registrado este mês.</div></div>' : `
        <div class="card">
          ${pagamentosAtrasadosEsteMes.map(p => `
            <div class="lancamento-row">
              <div>
                <div>${p.cat ? p.cat.nome : ''} <span class="lanc-meta">(referente a ${fmtMK(p.mesCompetencia)})</span></div>
                <div class="lanc-meta">Pago em ${fmtDateBR(`${p.pagoEmDate.getFullYear()}-${pad2(p.pagoEmDate.getMonth()+1)}-${pad2(p.pagoEmDate.getDate())}`)} · ${p.diasAtraso} dia${p.diasAtraso===1?'':'s'} de atraso</div>
              </div>
              <strong class="mono">${fmtMoney(p.valor)}</strong>
            </div>
          `).join('')}
        </div>
      `}

      <h2 style="margin-top:26px;">Parcelas em Andamento (visão futura)</h2>
      ${planosAtivos.length === 0 ? '<div class="card"><div class="empty">Nenhuma parcela em andamento no momento.</div></div>' : planosAtivos.map(p => `
        <div class="card">
          <strong>${p.cat ? p.cat.nome : ''}</strong>${p.cat && p.cat.isFatura ? '<span class="badge fatura">só controle, não soma na fatura</span>' : ''}
          <div class="lanc-meta" style="margin:4px 0;">
            Parcela ${p.st.parcelaAgora} de ${p.st.total} · ${fmtMoney(p.l.valor)}/mês ·
            faltam ${Math.max(p.st.restante,0)} parcela(s) (${fmtMoney(Math.max(p.st.restante,0)*p.l.valor)} restantes) ·
            termina em ${fmtMK(p.endMK)}
          </div>
          ${p.l.descricao ? `<div class="lanc-meta">${escapeHtml(p.l.descricao)}</div>` : ''}
        </div>
      `).join('')}

      <h2 style="margin-top:26px;">Organizar Categorias em Grupos</h2>
      <p class="subtext">O grupo define como o gráfico do Resumo do Mês agrupa os gastos (ex.: "Empréstimos" juntando Empréstimo Duda, Mercado Pago e Itaú). Deixe em branco para a categoria aparecer sozinha no gráfico.</p>
      <div class="card">
        <datalist id="grupos-existentes">
          ${gruposExistentes().map(g => `<option value="${escapeHtml(g)}">`).join('')}
        </datalist>
        ${state.categorias.map(c => `
          <div class="grid4" style="align-items:end; border-bottom:1px dashed var(--paper-line); padding-bottom:10px; margin-bottom:10px;">
            <div style="align-self:center; font-weight:600; font-size:13.5px;">${c.nome}</div>
            <div><label>Dia do vencimento</label><input type="number" min="1" max="31" data-dia="${c.id}" value="${c.diaVencimento||''}" placeholder="ex: 10"></div>
            <div><label>Valor esperado (R$)</label><input type="number" step="0.01" min="0" data-valor="${c.id}" value="${c.valorEsperado||''}" placeholder="0,00"></div>
            <div><label>Grupo (gráfico)</label><input type="text" data-grupo="${c.id}" value="${escapeHtml(c.grupo||'')}" list="grupos-existentes" placeholder="Ex.: Empréstimos"></div>
          </div>
        `).join('')}
        <button class="btn small" id="btn-salvar-config">Salvar configurações</button>
      </div>
      ${semData.length ? `<p class="subtext">Sem dia configurado ainda: ${semData.map(c=>c.nome).join(', ')}.</p>` : ''}

      <h2 style="margin-top:26px;">Adicionar Nova Categoria</h2>
      <p class="subtext">Crie categorias além das já existentes (ex.: um novo empréstimo, uma assinatura, etc.) e já escolha em qual grupo ela entra no gráfico.</p>
      <div class="card">
        <div class="grid4">
          <div>
            <label>Nome da categoria</label>
            <input type="text" id="nc-nome" placeholder="Ex.: Plano de Saúde">
          </div>
          <div>
            <label>Tipo (opcional)</label>
            <input type="text" id="nc-tipo" placeholder="Ex.: Recorrente, Empréstimo...">
          </div>
          <div>
            <label>Grupo (gráfico)</label>
            <input type="text" id="nc-grupo" list="grupos-existentes" placeholder="Ex.: Residência">
          </div>
          <div>
            <label>É fatura de cartão?</label>
            <select id="nc-fatura">
              <option value="nao">Não</option>
              <option value="sim">Sim</option>
            </select>
          </div>
        </div>
        <button class="btn small" id="btn-add-categoria">+ Adicionar categoria</button>
        <span id="nc-msg" style="margin-left:10px; font-size:12.5px; color:var(--stamp-green);"></span>
      </div>
    `;

    panel.querySelectorAll('[data-toggle-paga]').forEach(btn => {
      btn.addEventListener('click', async () => {
        try {
          const id = btn.dataset.togglePaga;
          const mesAlvo = btn.dataset.mes || mk;
          const lista = state.contasPagas[mesAlvo] || [];
          const { error } = await toggleContaPaga(mesAlvo, id, !lista.includes(id));
          if (error) throw error;
          await refrescarEexibir();
        } catch (err) { mostrarErro(err); }
      });
    });
    panel.querySelectorAll('[data-marcar-atrasado]').forEach(btn => {
      btn.addEventListener('click', async () => {
        try {
          const uid = btn.dataset.marcarAtrasado;
          const categoriaId = btn.dataset.cat;
          const mesAlvo = btn.dataset.mes;
          const valorInput = panel.querySelector(`#pgv-${uid}`);
          const dataInput = panel.querySelector(`#pgd-${uid}`);
          const valorPago = parseFloat(valorInput.value) || 0;
          const dataPagamento = dataInput.value || todayYMD();
          const { error } = await marcarPagoDetalhado(mesAlvo, categoriaId, valorPago, dataPagamento);
          if (error) throw error;
          await refrescarEexibir();
        } catch (err) { mostrarErro(err); }
      });
    });
    panel.querySelector('#btn-salvar-config').addEventListener('click', async () => {
      try {
        for (const c of state.categorias) {
          const diaInput = panel.querySelector(`[data-dia="${c.id}"]`);
          const valorInput = panel.querySelector(`[data-valor="${c.id}"]`);
          const grupoInput = panel.querySelector(`[data-grupo="${c.id}"]`);
          const dia = parseInt(diaInput.value, 10);
          const diaVencimento = (dia >= 1 && dia <= 31) ? dia : null;
          const valorEsperado = parseFloat(valorInput.value) || 0;
          const grupo = grupoInput.value.trim();
          const { error } = await salvarConfigCategoria(c.id, diaVencimento, valorEsperado, grupo);
          if (error) throw error;
        }
        await refrescarEexibir();
      } catch (err) { mostrarErro(err); }
    });
    panel.querySelector('#btn-add-categoria').addEventListener('click', async () => {
      const nome = panel.querySelector('#nc-nome').value.trim();
      const tipo = panel.querySelector('#nc-tipo').value.trim();
      const grupo = panel.querySelector('#nc-grupo').value.trim();
      const isFatura = panel.querySelector('#nc-fatura').value === 'sim';
      const msg = panel.querySelector('#nc-msg');
      if (!nome) { msg.style.color = 'var(--stamp-red)'; msg.textContent = 'Digite um nome para a categoria.'; return; }
      try {
        const { error } = await criarCategoria(nome, tipo, isFatura, grupo);
        if (error) throw error;
        msg.style.color = 'var(--stamp-green)'; msg.textContent = 'Categoria criada!';
        await refrescarEexibir();
      } catch (err) { mostrarErro(err); }
    });
  }

  // ============================================================
  // BOOT
  // ============================================================
  function renderSetupWarning(){
    document.getElementById('app-root').innerHTML = `
      <div class="setup-warning">
        <strong>Configuração pendente.</strong><br><br>
        Este app ainda não foi ligado ao seu banco de dados. Abra o arquivo .html, encontre as linhas perto do topo do
        <code>&lt;script&gt;</code> com <code>SUPABASE_URL</code> e <code>SUPABASE_ANON_KEY</code>, e cole os valores
        do seu projeto Supabase (Project Settings → API). Depois salve e recarregue a página.
      </div>
    `;
  }

  function renderErro(titulo, detalhe){
    document.getElementById('app-root').innerHTML = `
      <div class="setup-warning">
        <strong>${escapeHtml(titulo)}</strong><br><br>
        ${escapeHtml(detalhe)}
      </div>
    `;
  }

  window.addEventListener('error', function(e){
    const root = document.getElementById('app-root');
    if (root && !root.innerHTML.trim()) {
      renderErro('Ocorreu um erro ao carregar o app', e.message || 'Erro desconhecido.');
    }
  });

  (async function init(){
    try {
      if (!SUPABASE_URL || SUPABASE_URL.indexOf('COLE_AQUI') === 0 || !SUPABASE_ANON_KEY || SUPABASE_ANON_KEY.indexOf('COLE_AQUI') === 0) {
        renderSetupWarning();
        return;
      }
      if (typeof window.supabase === 'undefined' || !window.supabase.createClient) {
        renderErro(
          'Não consegui carregar a biblioteca do Supabase',
          'Isso costuma acontecer por falta de conexão com a internet, um bloqueador de anúncios/script, ou o navegador ' +
          'usado para abrir o arquivo. Tente: 1) checar sua internet, 2) abrir o arquivo em outro navegador (Chrome ou ' +
          'Edge), 3) desativar temporariamente bloqueadores de anúncio/rastreamento para este arquivo, e recarregar a página.'
        );
        return;
      }

      sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

      sb.auth.onAuthStateChange(async (event, session) => {
        try {
          if (session && session.user) {
            currentUser = session.user;
            await fetchAll();
            render();
            subscribeRealtime();
          } else {
            currentUser = null;
            unsubscribeRealtime();
            renderLogin();
          }
        } catch (err) {
          renderErro('Erro ao carregar seus dados', (err && err.message) ? err.message : String(err));
        }
      });

      const { data, error } = await sb.auth.getSession();
      if (error) { renderErro('Erro ao verificar sessão', error.message); return; }
      if (data.session && data.session.user) {
        currentUser = data.session.user;
        await fetchAll();
        render();
        subscribeRealtime();
      } else {
        renderLogin();
      }

      setInterval(() => { if (currentUser) onRemoteChange(); }, 20000);
    } catch (err) {
      renderErro('Erro inesperado ao iniciar o app', (err && err.message) ? err.message : String(err));
    }
  })();
})();
</script>
</body>
</html>
